<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1f6f6a">
    <title>LifeWalk VR</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main id="app" class="app" aria-label="LifeWalk VR">
      <section id="sceneRoot" class="scene-root" aria-label="Interactive real life scene">
        <div id="loadScreen" class="load-screen" aria-live="polite">
          <div class="load-mark" aria-hidden="true"></div>
          <span>LifeWalk VR</span>
        </div>
        <div id="reticle" class="reticle" aria-hidden="true"></div>
      </section>

      <header class="hud hud-top">
        <a class="brand" href="#" aria-label="LifeWalk VR">
          <span>LifeWalk</span>
          <strong>VR</strong>
        </a>

        <div class="status-strip" aria-live="polite">
          <span id="placeLabel" class="status-pill">Home</span>
          <span id="timeLabel" class="status-pill">Morning</span>
          <span id="deviceLabel" class="status-pill">Laptop</span>
        </div>

        <nav class="segmented" aria-label="Places">
          <button class="active" type="button" data-place="home">Home</button>
          <button type="button" data-place="street">Street</button>
          <button type="button" data-place="park">Park</button>
        </nav>

        <div class="tools" aria-label="Experience tools">
          <button id="vrBtn" class="icon-button" type="button" aria-label="Enter VR" title="Enter VR">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 10.2c.4-2.2 1.8-3.4 4.2-3.4h7.6c2.4 0 3.8 1.2 4.2 3.4l.7 4.1c.3 1.8-.7 3.2-2.4 3.2h-2.2c-1 0-1.6-.4-2.2-1.2l-.8-1.1c-.3-.4-.6-.6-1.1-.6s-.8.2-1.1.6l-.8 1.1c-.6.8-1.2 1.2-2.2 1.2H5.7c-1.7 0-2.7-1.4-2.4-3.2l.7-4.1Z"></path>
              <path d="M8 11h2"></path>
              <path d="M15 11h2"></path>
            </svg>
          </button>
          <button id="soundBtn" class="icon-button" type="button" aria-label="Sound" title="Sound">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 9v6h4l5 4V5L9 9H5Z"></path>
              <path d="M17 9.5a4 4 0 0 1 0 5"></path>
              <path d="M19.5 7a7.5 7.5 0 0 1 0 10"></path>
            </svg>
          </button>
          <button id="timeBtn" class="icon-button" type="button" aria-label="Change time" title="Change time">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2"></path>
              <path d="M12 20v2"></path>
              <path d="m4.9 4.9 1.4 1.4"></path>
              <path d="m17.7 17.7 1.4 1.4"></path>
              <path d="M2 12h2"></path>
              <path d="M20 12h2"></path>
              <path d="m4.9 19.1 1.4-1.4"></path>
              <path d="m17.7 6.3 1.4-1.4"></path>
            </svg>
          </button>
          <button id="resetBtn" class="icon-button" type="button" aria-label="Reset view" title="Reset view">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 3-6.7"></path>
              <path d="M3 4v5h5"></path>
            </svg>
          </button>
          <button id="fullBtn" class="icon-button" type="button" aria-label="Fullscreen" title="Fullscreen">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 3H3v5"></path>
              <path d="M16 3h5v5"></path>
              <path d="M8 21H3v-5"></path>
              <path d="M16 21h5v-5"></path>
            </svg>
          </button>
        </div>
      </header>

      <aside id="momentPanel" class="moment-panel" aria-live="polite">
        <span id="momentText">Fresh coffee, city light, open air.</span>
      </aside>

      <div id="moveStick" class="touch-control move-stick" aria-label="Move">
        <div class="stick-label" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 3v18"></path>
            <path d="m7 8 5-5 5 5"></path>
            <path d="m7 16 5 5 5-5"></path>
          </svg>
        </div>
        <div id="moveKnob" class="stick-knob"></div>
      </div>

      <div id="lookPad" class="touch-control look-pad" aria-label="Look">
        <div class="stick-label" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
            <circle cx="12" cy="12" r="2.5"></circle>
          </svg>
        </div>
      </div>

      <section id="errorPanel" class="error-panel" hidden>
        <strong>LifeWalk VR could not start.</strong>
        <span id="errorText">The 3D engine did not load.</span>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
